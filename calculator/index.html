<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="theme-toggle">
            <span class="mode-icon">☀️</span>
            <label class="switch">
                <input type="checkbox" id="theme-checkbox">
                <span class="slider round"></span>
            </label>
            <span class="mode-icon">🌙</span>
        </div>

        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>

        <div class="buttons-grid">
            <button data-clear class="btn color-alt">AC</button>
            <button data-delete class="btn color-alt">DEL</button>
            <button data-operation class="btn color-alt">%</button>
            <button data-operation class="btn color-op">÷</button>

            <button data-number class="btn">7</button>
            <button data-number class="btn">8</button>
            <button data-number class="btn">9</button>
            <button data-operation class="btn color-op">×</button>

            <button data-number class="btn">4</button>
            <button data-number class="btn">5</button>
            <button data-number class="btn">6</button>
            <button data-operation class="btn color-op">-</button>

            <button data-number class="btn">1</button>
            <button data-number class="btn">2</button>
            <button data-number class="btn">3</button>
            <button data-operation class="btn color-op">+</button>

            <button data-number class="btn span-two">0</button>
            <button data-number class="btn">.</button>
            <button data-equals class="btn color-op">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
